<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <meta name="description" content="ארכיון גיליונות עמנואל שלי">
  <title>עמנואל שלי</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Frank+Ruhl+Libre:wght@400;700;900&family=Heebo:wght@300;400;500;700&display=swap" rel="stylesheet">

  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- ── Masthead ─────────────────────────────────────────────────────────── -->
  <header id="masthead">
    <div class="masthead-inner">
      <div class="masthead-side masthead-right">
        <span class="masthead-label">גיליון</span>
        <span id="mh-issue" class="masthead-value">—</span>
      </div>

      <div class="masthead-center">
        <h1 id="mh-name" class="masthead-title">עמנואל שלי</h1>
        <div class="masthead-rules">
          <div class="masthead-rule thick"></div>
          <div class="masthead-rule thin"></div>
        </div>
        <p id="mh-tagline" class="masthead-tagline"></p>
      </div>

      <div class="masthead-side masthead-left">
        <span class="masthead-label">תאריך</span>
        <span id="mh-date" class="masthead-value">—</span>
      </div>
    </div>
  </header>

  <!-- ── Sub-nav ───────────────────────────────────────────────────────────── -->
  <nav id="sub-nav">
    <div class="sub-nav-inner">
      <a class="sub-nav-btn" href="about.html">אודות</a>
      <span class="sub-nav-sep" aria-hidden="true">|</span>
      <a class="sub-nav-btn" href="contact.html">צור קשר</a>
    </div>
  </nav>

  <!-- ── Loading view ──────────────────────────────────────────────────────── -->
  <div id="loading-view" class="view" aria-live="polite">
    <div class="spinner" aria-hidden="true">
      <div class="spinner-ring"></div>
    </div>
    <p id="loading-text" class="loading-label">טוען...</p>
  </div>

  <!-- ── Home view ─────────────────────────────────────────────────────────── -->
  <div id="home-view" class="view hidden">
    <div class="home-inner">

      <!-- Featured latest issue -->
      <div id="featured-container"></div>

      <!-- Previous issues (all but the latest) -->
      <section id="prev-section" class="hidden">
        <div class="section-divider">
          <div class="section-rule"></div>
          <h2 class="section-heading">גיליונות קודמים</h2>
          <div class="section-rule"></div>
        </div>
        <div id="prev-container"></div>
      </section>

    </div>
  </div>

  <!-- ── Viewer view ───────────────────────────────────────────────────────── -->
  <div id="viewer-view" class="view hidden" aria-label="צופה עיתון">

    <div id="viewer-topbar">
      <button id="btn-back" class="viewer-btn">← חזרה</button>
      <span id="page-indicator" class="page-indicator"></span>
      <div class="viewer-btn-group">
        <button id="btn-fullscreen" class="viewer-btn icon-btn" title="מסך מלא">&#x26F6;</button>
      </div>
    </div>

    <div id="spread-wrap">
      <button id="btn-nav-left"  class="nav-btn nav-btn-left"  aria-label="הדף הבא">❮</button>

      <div id="spread-container">
        <canvas id="canvas-right"></canvas>
        <canvas id="canvas-left" style="display:none"></canvas>
      </div>

      <button id="btn-nav-right" class="nav-btn nav-btn-right" aria-label="הדף הקודם">❯</button>
    </div>

  </div>

  <!-- ── Error toast ───────────────────────────────────────────────────────── -->
  <div id="error-toast" class="error-toast hidden" role="alert"></div>

  <script src="js/config.js"></script>
  <script src="js/archive.js"></script>
  <script src="js/viewer.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
